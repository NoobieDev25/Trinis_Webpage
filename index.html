<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./output.css">
</head>
<body>

    <section id="home" class="mt-10">
        <!--Navbar-->
        <header class="sticky top-0 z-40 bg-white shadow-sm translate-y-3 max-w-[680px] mx-auto px-4 py-2">
            <ul class="flex justify-center gap-6 sm:gap-12 list-none m-0 p-0 w-fit mx-auto border-b border-gray-300 pb-3">
                <li><a href="index.html"class="cursor-pointer font-medium hover-gray-600">Home</a></li>
                <li><a href="about_me.html"class="cursor-pointer font-medium hover-gray-600">About me</a></li>
                <li><a href="#partnership" class="cursor-pointer font-medium hover-gray-600">Partnership</a></li>
            </ul>
        </header>

        <!-- Carousel Section -->
        <section class="py-8 sm:py-12">
            <div id="carousel" class="mx-auto w-full max-w-xs sm:max-w-sm md:max-w-md px-4">

                <!-- Slide 1 -->
                <div class="carousel-slide duration-700 ease-in-out">
                    <img src="images/welcome.png" class="w-full object-cover rounded-lg" alt="Slide 1">
                </div>
            </div>
    

            <!--Corners Design-->
            <!--Upper Left Border-->
            <img src="/images/border_upper.png"
                class="absolute top-0 left-0 w-16 h-24 sm:w-24 sm:h-40 md:w-36 md:h-60 z-0">
    
            <!--Upper Right Border-->
            <img src="/images/border_upper.png"
                class="absolute top-0 right-0 w-16 h-24 sm:w-24 sm:h-40 md:w-36 md:h-60 transform -scale-x-100 z-0">

            <script src="carousel.JS"></script>
        </section>

        <div class="max-w-5xl mx-auto mt-6 sm:mt-10 px-4 pb-8">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8 justify-items-center">

                <!--Book Card Arco de Luna-->
                <div class="bg-[#f7f2e9] border-2 rounded-lg shadow-sm p-4 w-full max-w-xs hover:shadow-md transition-shadow duration-300">
                    <img
                        src="/images/arco_luna.jpeg"
                        alt="Book Cover"
                        class="w-full h-48 sm:h-40 object-cover rounded-md">
                    <h3 class="mt-3 text-base sm:text-lg font-semibold text-gray-800">Arco de Luna</h3>
                    <a
                        href="https://www.amazon.com/-/es/Arco-Luna-Trini-Torres-Carrion/dp/B0B8R995DD"
                        target="Amazon"
                        class="inline-block mt-2 text-blue-600 font-medium text-sm sm:text-base hover:underline">
                        Find this book
                    </a>
                </div>
                    
                <div class="bg-[#f7f2e9] border-2 rounded-lg shadow-sm p-4 w-full max-w-xs hover:shadow-md transition-shadow duration-300">
                    <img
                        src="/images/bajar_volumen.jpeg"
                        alt="Book Cover"
                        class="w-full h-48 sm:h-40 object-cover rounded-md">
                    <h3 class="mt-3 text-base sm:text-lg font-semibold text-gray-800">¿Podrías bajar el volumen, por favor?</h3>
                    <a
                        href="https://www.amazon.com/-/es/%C2%BFPodr%C3%ADas-bajar-volumen-por-favor/dp/B0DT3M8T2K"
                        target="Amazon"
                        class="inline-block mt-2 text-blue-600 font-medium text-sm sm:text-base hover:underline">
                        Find this book - Amazon
                    </a>
                     <a
                        href="https://www.msbookspr.com/products/podrias-bajar-el-volumen-por-favor"
                        target="Msbooks"
                        class="inline-block mt-2 text-blue-600 font-medium text-sm sm:text-base hover:underline">
                        Find this book - Msbooks
                    </a>
                </div>
            </div>
        </div>
    </body>
</html>
